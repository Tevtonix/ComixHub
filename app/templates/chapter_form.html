{% extends "base.html" %}

{% block content %}
<div style="max-width: 560px; margin: 40px auto;">

  <div style="font-family: var(--font-crt); font-size: 0.78em; color: var(--text-dim);
              letter-spacing: 0.25em; margin-bottom: 14px;">
    // ЗАГРУЗКА НОВОЙ ГЛАВЫ //
  </div>

  <h2 style="margin-bottom: 6px; font-size: 1.1em; letter-spacing: 0.25em;">
    Добавить главу
  </h2>
  <p style="color: var(--text-dim); font-size: 0.82em; margin-bottom: 28px;">
    Объект: <strong>{{ comic.title }}</strong>
  </p>

  <form method="post" action="/comics/{{ comic.id }}/chapters" enctype="multipart/form-data">
    <p>
      <label>// Номер главы</label>
      <input type="number" name="chapter_number" min="1" required placeholder="1">
    </p>
    <p>
      <label>// Название главы</label>
      <input type="text" name="title" required placeholder="название главы">
    </p>
    <p>
      <label>// Страницы (можно выбрать несколько)</label>
      <input type="file" name="pages" multiple accept="image/*" required>
      <span style="font-size: 0.72em; color: var(--text-dim); display: block; margin-top: 6px;">
        Поддерживаемые форматы: JPG, PNG, WEBP
      </span>
    </p>
    <div style="margin-top: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <button type="submit">[ ОПУБЛИКОВАТЬ ГЛАВУ ]</button>
      <a href="/comics/{{ comic.id }}" style="color: var(--text-dim); font-size: 0.8em; letter-spacing: 0.1em;">
        ◁ Назад к комиксу
      </a>
    </div>
  </form>

</div>
{% endblock %}
