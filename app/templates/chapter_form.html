{% extends "base.html" %}

{% block content %}
<h2>Добавить новую главу</h2>
<p>Комикс: <strong>{{ comic.title }}</strong></p>

<form method="post" action="/comics/{{ comic.id }}/chapters" enctype="multipart/form-data">
    <p>
        <label>Номер главы:<br>
            <input type="number" name="chapter_number" min="1" required>
        </label>
    </p>
    <p>
        <label>Название главы:<br>
            <input type="text" name="title" required style="width: 400px;">
        </label>
    </p>
    <p>
        <label>Страницы главы (можно выбрать несколько):<br>
            <input type="file" name="pages" multiple accept="image/*" required>
        </label>
    </p>
    <button type="submit">Опубликовать главу</button>
</form>

<a href="/comics/{{ comic.id }}">← Назад к комиксу</a>
{% endblock %}
