{% extends "base.html" %}

{% block content %}
<h2>Опубликовать комикс</h2>
<form method="POST" action="/comics/">
    <p>
        <label>Название:<br>
            <input type="text" name="title" required>
        </label>
    </p>
    <p>
        <label>Описание:<br>
            <textarea name="description" rows="5"></textarea>
        </label>
    </p>
    <button type="submit">Опубликовать</button>
</form>
{% endblock %}
