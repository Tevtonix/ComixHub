{% extends "base.html" %}

{% block content %}
<h2>Комиксы</h2>
{% if comics %}
    <ul>
    {% for comic in comics %}
        <li><strong>{{ comic.title }}</strong> — {{ comic.description|truncate(100) }}</li>
    {% endfor %}
    </ul>
{% else %}
    <p>Пока нет комиксов. Стань первым автором!</p>
{% endif %}
{% endblock %}
